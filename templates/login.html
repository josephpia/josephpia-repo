<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            font-family: Arial;
            background: linear-gradient(135deg,#667eea,#3e3aab);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        input, button{
            width:90%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
        }

        button{
            background:#667eea;
            color:white;
            border:none;
        }

        a{
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>

    <p style="color:red;">{{ message }}</p>

    <p>Don't have an account? <a href="/signup">Sign Up</a></p>
</div>

</body>
</html>
