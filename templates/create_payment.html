<!DOCTYPE html>
<html>
<head>
    <title>Create Payment - ServiceHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { max-width: 600px; width: 100%; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h2 { color: #1f2937; margin-bottom: 10px; }
        .subtitle { color: #6b7280; margin-bottom: 30px; }
        
        .request-info { background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .amount { font-size: 36px; font-weight: bold; color: #10b981; margin: 10px 0; }
        
        .payment-method-card { border: 2px solid #e5e7eb; border-radius: 12px; padding: 20px; margin: 15px 0; cursor: pointer; transition: all 0.3s; }
        .payment-method-card:hover { border-color: #667eea; background: #f8fafc; }
        .payment-method-card.selected { border-color: #10b981; background: #f0fdf4; }
        .payment-method-card input { margin-right: 10px; }
        
        .btn { padding: 14px 28px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; }
        .btn-primary { background: #10b981; color: white; }
        .btn-primary:hover { background: #059669; }
        .btn-secondary { background: #6b7280; color: white; margin-top: 10px; }
        
        a { text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💳 Make Payment</h2>
        <p class="subtitle">Choose your preferred payment method</p>
        
        <div class="request-info">
            <div><strong>Request ID:</strong> {{ request.id }}</div>
            <div><strong>Service:</strong> {{ request.service[:100] }}...</div>
            <div class="amount">₱{{ request.price|default(500) }}</div>
            <div><strong>Category:</strong> {{ request.category }}</div>
        </div>
        
        <form method="POST" action="/process_payment" id="paymentForm">
            <input type="hidden" name="request_id" value="{{ request.id }}">
            
            {% for method_id, method in payment_methods.items() %}
            <div class="payment-method-card" onclick="selectMethod('{{ method_id }}')">
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="radio" name="payment_method" value="{{ method_id }}" required>
                    <div style="flex: 1;">
                        <div style="font-weight: 600; font-size: 16px;">
                            {% if method_id == 'gcash' %}📱 GCash
                            {% elif method_id == 'maya' %}📱 Maya
                            {% elif method_id == 'bank_transfer' %}🏦 Bank Transfer
                            {% elif method_id == 'cod' %}💵 Cash on Delivery
                            {% else %}{{ method.name }}{% endif %}
                        </div>
                        <div style="font-size: 12px; color: #6b7280; margin-top: 5px;">
                            {{ method.account_number }} - {{ method.account_name }}
                        </div>
                    </div>
                </label>
            </div>
            {% endfor %}
            
            <button type="submit" class="btn btn-primary">Continue to Payment</button>
            <a href="/userdashboard"><button type="button" class="btn btn-secondary">Cancel</button></a>
        </form>
    </div>
    
    <script>
        function selectMethod(methodId) {
            document.querySelectorAll('.payment-method-card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            event.currentTarget.querySelector('input[type="radio"]').checked = true;
        }
    </script>
</body>
</html>
